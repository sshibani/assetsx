# AssetX — development stack.
#
# All apps run in containers with hot-reload (source is bind-mounted).
# Environment is consolidated in a single root `.env` (copy from .env.example),
# referenced by every service via `env_file:`.
#
# Usage:
#   cp .env.example .env
#   docker compose up --build
#
# Web:    http://localhost:3000
# API:    http://localhost:3001
# Redis:  localhost:6379
#
# Notes on volumes:
#   - `./:/app` bind-mounts the source for hot-reload.
#   - `app-node-modules` and each `pkg-*-dist` are container-managed volumes so
#     the image's installed dependencies and freshly built package outputs are
#     never shadowed by the host bind mount.
#   - `app-data` is shared by api + worker and holds the SQLite DB (/data/db)
#     and uploaded files (/data/storage).

x-app-build: &app-build
  build:
    context: .
    dockerfile: Dockerfile.dev

x-app-env: &app-env
  env_file:
    - .env
  environment:
    API_URL: http://api:3001
    REDIS_HOST: redis
    STORAGE_ROOT: /app/apps/api/storage-data

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # One-shot: prepare the SQLite schema and seed the super user, then exit.
  migrate:
    <<: [*app-build, *app-env]
    command: >
      sh -c "mkdir -p /data/db /data/storage &&
             pnpm --filter @assetx/api db:push &&
             pnpm --filter @assetx/api db:seed &&
             pnpm --filter @assetx/api accounts:backfill:container"
    volumes:
      - ./:/app
      - app-node-modules:/app/node_modules
      - api-node-modules:/app/apps/api/node_modules
      - worker-node-modules:/app/apps/worker/node_modules
      - web-node-modules:/app/apps/web/node_modules
      - pkg-auth-node-modules:/app/packages/auth/node_modules
      - pkg-image-processing-node-modules:/app/packages/image-processing/node_modules
      - pkg-publishing-node-modules:/app/packages/publishing/node_modules
      - pkg-queue-node-modules:/app/packages/queue/node_modules
      - pkg-shared-types-node-modules:/app/packages/shared-types/node_modules
      - pkg-storage-node-modules:/app/packages/storage/node_modules
      - pkg-auth-dist:/app/packages/auth/dist
      - pkg-image-processing-dist:/app/packages/image-processing/dist
      - pkg-publishing-dist:/app/packages/publishing/dist
      - pkg-queue-dist:/app/packages/queue/dist
      - pkg-shared-types-dist:/app/packages/shared-types/dist
      - pkg-storage-dist:/app/packages/storage/dist
      - app-data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"

  api:
    <<: [*app-build, *app-env]
    command: ["pnpm", "--filter", "@assetx/api", "dev:container"]
    ports:
      - "3001:3001"
    volumes:
      - ./:/app
      - app-node-modules:/app/node_modules
      - api-node-modules:/app/apps/api/node_modules
      - worker-node-modules:/app/apps/worker/node_modules
      - web-node-modules:/app/apps/web/node_modules
      - pkg-auth-node-modules:/app/packages/auth/node_modules
      - pkg-image-processing-node-modules:/app/packages/image-processing/node_modules
      - pkg-publishing-node-modules:/app/packages/publishing/node_modules
      - pkg-queue-node-modules:/app/packages/queue/node_modules
      - pkg-shared-types-node-modules:/app/packages/shared-types/node_modules
      - pkg-storage-node-modules:/app/packages/storage/node_modules
      - pkg-auth-dist:/app/packages/auth/dist
      - pkg-image-processing-dist:/app/packages/image-processing/dist
      - pkg-publishing-dist:/app/packages/publishing/dist
      - pkg-queue-dist:/app/packages/queue/dist
      - pkg-shared-types-dist:/app/packages/shared-types/dist
      - pkg-storage-dist:/app/packages/storage/dist
      - app-data:/data
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        ["CMD", "node", "-e",
         "fetch('http://localhost:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    <<: [*app-build, *app-env]
    command: ["pnpm", "--filter", "@assetx/worker", "dev:container"]
    volumes:
      - ./:/app
      - app-node-modules:/app/node_modules
      - api-node-modules:/app/apps/api/node_modules
      - worker-node-modules:/app/apps/worker/node_modules
      - web-node-modules:/app/apps/web/node_modules
      - pkg-auth-node-modules:/app/packages/auth/node_modules
      - pkg-image-processing-node-modules:/app/packages/image-processing/node_modules
      - pkg-publishing-node-modules:/app/packages/publishing/node_modules
      - pkg-queue-node-modules:/app/packages/queue/node_modules
      - pkg-shared-types-node-modules:/app/packages/shared-types/node_modules
      - pkg-storage-node-modules:/app/packages/storage/node_modules
      - pkg-auth-dist:/app/packages/auth/dist
      - pkg-image-processing-dist:/app/packages/image-processing/dist
      - pkg-publishing-dist:/app/packages/publishing/dist
      - pkg-queue-dist:/app/packages/queue/dist
      - pkg-shared-types-dist:/app/packages/shared-types/dist
      - pkg-storage-dist:/app/packages/storage/dist
      - app-data:/data
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    <<: [*app-build, *app-env]
    command: ["pnpm", "--filter", "@assetx/web", "dev"]
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - app-node-modules:/app/node_modules
      - api-node-modules:/app/apps/api/node_modules
      - worker-node-modules:/app/apps/worker/node_modules
      - web-node-modules:/app/apps/web/node_modules
      - pkg-shared-types-node-modules:/app/packages/shared-types/node_modules
      - pkg-shared-types-dist:/app/packages/shared-types/dist
      - web-next-cache:/app/apps/web/.next
    depends_on:
      api:
        condition: service_started

volumes:
  redis-data:
  app-node-modules:
  api-node-modules:
  worker-node-modules:
  web-node-modules:
  app-data:
  web-next-cache:
  pkg-auth-node-modules:
  pkg-image-processing-node-modules:
  pkg-publishing-node-modules:
  pkg-queue-node-modules:
  pkg-shared-types-node-modules:
  pkg-storage-node-modules:
  pkg-auth-dist:
  pkg-image-processing-dist:
  pkg-publishing-dist:
  pkg-queue-dist:
  pkg-shared-types-dist:
  pkg-storage-dist:
