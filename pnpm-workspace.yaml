packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  argon2: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  sharp: true

onlyBuiltDependencies:
  - esbuild
  - sharp
  - argon2
  - "@prisma/client"
  - "@prisma/engines"
  - prisma
  - msgpackr-extract
